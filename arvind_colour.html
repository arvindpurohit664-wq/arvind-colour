<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arvind Colour</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
}

h1 {
  margin-top: 10px;
}

canvas {
  display: block;
  margin: auto;
  background: #111;
  border: 2px solid white;
}
</style>
</head>

<body>

<h1>🎮 Arvind Colour</h1>
<p>Press R (Red), G (Green), B (Blue)</p>

<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let currentColor = "";
let colors = ["red", "green", "blue"];
let score = 0;
let gameOver = false;

function newRound() {
  currentColor = colors[Math.floor(Math.random() * colors.length)];
}

function drawGame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = currentColor;
  ctx.fillRect(150, 200, 100, 100);

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);
}

function gameOverScreen() {
  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText("Game Over", 120, 150);
  ctx.fillText("Score: " + score, 140, 200);
  ctx.font = "18px Arial";
  ctx.fillText("Refresh page to restart", 100, 250);
}

document.addEventListener("keydown", function(e) {
  if (gameOver) return;

  let key = e.key.toLowerCase();

  if (
    (key === "r" && currentColor === "red") ||
    (key === "g" && currentColor === "green") ||
    (key === "b" && currentColor === "blue")
  ) {
    score++;
    newRound();
  } else if (key === "r" || key === "g" || key === "b") {
    gameOver = true;
  }
});

function update() {
  if (!gameOver) {
    drawGame();
    requestAnimationFrame(update);
  } else {
    gameOverScreen();
  }
}

newRound();
update();
</script>

</body>
</html>
